<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweater Pink</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f4f4;
      }

      .header {
        background: #ff4fa3;
        color: #fff;
        padding: 18px;
        font-size: 22px;
        font-weight: bold;
        text-align: center;
      }

      .container {
        max-width: 700px;
        margin: auto;
        padding: 15px;
      }

      input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
        font-size: 15px;
      }

      .item {
        background: #fff;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: 0.2s;
        border: 1px solid #eee;
      }

      .item:hover {
        background: #fafafa;
      }

      .title {
        font-size: 18px;
        font-weight: bold;
      }

      #detail {
        display: none;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        padding: 15px;
        border: 1px solid #eee;
      }

      pre {
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 14px;
      }

      .btn {
        width: 100%;
        padding: 13px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        color: #fff;
      }

      .back {
        background: #ff4fa3;
      }

      .copy {
        background: #28a745;
      }

      .wa {
        background: #25d366;
      }
    </style>
  </head>
  <body>
    <div class="header">Sweater Pink Tools Whatsapp Bisnis</div>

    <div class="container">
      <div id="list">
        <input
          id="search"
          type="text"
          placeholder="Cari..."
          onkeyup="filter()"
        />

        <div id="items"></div>
      </div>

      <div id="detail">
        <button class="btn back" onclick="back()">Kembali</button>

        <br /><br />

        <div class="card">
          <h2 id="judul"></h2>

          <br />

          <pre id="pesan"></pre>
        </div>

        <button class="btn copy" onclick="copyMsg()">Copy Pesan</button>

        <button class="btn wa" onclick="wa()">Kirim ke WhatsApp</button>
      </div>
    </div>

    <script>
      const data = [
        {
          title: "QRIS DANA",
          text: `🔁 *PAYMENT INFO*

Atas Nama : *LUKMAN CELL*

💳 Metode Pembayaran
*Dana* 
*083870282897*
*Gambar Qris All Payment*
*https://www.sweaterpink.web.id/icon-wa/qris-dana.jpg*
==============================
*INFORMASI*
- Silahkan lakukan konfirmasi pembayaran dengan mengirimkan bukti pembayaran jika anda sudah melakukan pembayaran
- silahkan request config atau pesanan anda
==============================

Terima Kasih
salam
_Sweater Pink_`,
        },

        {
          title: "GARANSI",
          text: `*_Note Garansi_* :

⚠️⚠️⚠️⚠️⚠️⚠️⚠️
*_Tolong Budayakan Membaca Trimakasih_*

*_1._* simpan note pembelian username atau note akun lengkap pembelian yang admin kirim serta tanggal kadaluarsa, jika terjadi kesalahan dalam config, kamu bisa kirim note tersebut untuk perbaikan atau pembuatan config baru sesuai kadaluarsa (*no debat*).

*_2._* garansi ( hanya berlaku jika trick masi bisa di tkp masing-masing ).

*_3._* max login sesuai pembelian (device / hp), jika konek lebih dari batas pembelian sistem kami akan ban permanen (*no debat*).

*_4._* QRIS hanya digunakan untuk konfirmasi transaksi pertama saat pembelian.
Selanjutnya, seluruh proses menggunakan username, password, dan data (note) yang sudah tercatat atau dikirim oleh admin.

Untuk garansi atau perbaikan juga dilakukan melalui data tersebut, dan admin akan menggunakan informasi itu untuk melakukan pengecekan maupun perbaikan.

QRIS tidak dapat digunakan untuk proses garansi pada semua transaksi, karena jumlah transaksi yang masuk sangat banyak, bukan hanya satu atau dua, serta berisiko disalahgunakan (*no debat*).

<------------------------------------------------------->

- kami memberikan garansi di atas untuk mempermudah pembuatan atau mengganti config baru jika terjadi kematian pada trick atau kuota yang tidak dapat lagi di inject.

- matikan hapus pesan otomatis jika username hilang atau lupa tidak ada garansi mohon dimengerti kebijakan kami yang wajib disepakati ya.
 <------------------------------------------------------->
  
  🍻 SLAMAT MENIKMATI 🍻

trimakasih sudah order yaaa 🙏
salam
sweater pink `,
        },

        {
          title: "ORDER",
          text: `> 💎 Lengkapi detail order kamu di bawah ini ya — biar mimin bisa siapkan pesanan kamu dengan cepat dan tepat 😉
Setelah dikirim, mimin akan konfirmasi langsung via WhatsApp.
https://www.sweaterpink.web.id/order `,
        },

        {
          title: "GAME",
          text: `*🎮 GAME ONLINE*

VPN dapat digunakan untuk beberapa game online, tetapi **tidak semua game cocok menggunakan VPN**.

Game yang membutuhkan **ping dan latensi rendah**, seperti *Mobile Legends*, umumnya akan mengalami peningkatan ping saat menggunakan VPN. Hal ini wajar karena koneksi harus melewati server VPN terlebih dahulu.

*💡 Saran:*

* Gunakan kartu SIM lain dengan **data reguler (bukan VPN)** saat bermain game.
* Pastikan kualitas jaringan di lokasi Anda memang bagus, karena data reguler pun bisa mengalami lag jika sinyal sedang buruk.
* Untuk pengalaman bermain yang lebih stabil, **menggunakan Wi-Fi** adalah pilihan yang paling disarankan.

*📌 Kesimpulan:*
VPN lebih cocok digunakan untuk kebutuhan internet tertentu, **bukan untuk mengutamakan performa game online**. Jadi, jangan berharap semua game akan berjalan lancar menggunakan VPN, terutama game yang sangat bergantung pada ping dan latensi yang rendah.
`,
        },

        {
          title: "APN SETTIG",
          text: `*APN SETTING*

untuk yang on off mode pesawat 1-3 x masi tidak konek coba buat apn baru cek video di bawah ini

*Cara membuat APN baru*👇
https://sweaterpink.web.id/apn/ `,
        },
      ];

      const items = document.getElementById("items");

      function render(arr) {
        items.innerHTML = "";

        arr.forEach((d) => {
          items.innerHTML += `
<div class="item" onclick="openItem('${d.title}')">
<div class="title">${d.title}</div>
</div>
`;
        });
      }

      render(data);

      let current = "";

      function openItem(title) {
        const d = data.find((x) => x.title === title);

        current = d.text;

        document.getElementById("judul").innerText = d.title;

        document.getElementById("pesan").innerText = d.text;

        document.getElementById("list").style.display = "none";

        document.getElementById("detail").style.display = "block";
      }

      function back() {
        document.getElementById("detail").style.display = "none";

        document.getElementById("list").style.display = "block";
      }

      function copyMsg() {
        navigator.clipboard.writeText(current);

        alert("Pesan berhasil di-copy");
      }

      function wa() {
        const text = current.normalize("NFC");
        window.open(
          "https://api.whatsapp.com/send?text=" + encodeURIComponent(text),
          "_blank",
        );
      }
      function filter() {
        const v = document.getElementById("search").value.toLowerCase();

        render(data.filter((x) => x.title.toLowerCase().includes(v)));
      }
    </script>
  </body>
</html>
