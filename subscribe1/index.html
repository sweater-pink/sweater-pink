.card{

.card::before{

.card::after{

  background:rgba(59,130,246,.12);
  border-radius:50%;
  bottom:-70px;
  left:-70px;
  filter:blur(20px);
}

    transform:translateY(20px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

.logo{

  position:relative;
  z-index:2;
}

@keyframes logoGlow{
  from{
    box-shadow:0 0 15px rgba(255,0,80,.3);
  }

  to{
    box-shadow:0 0 35px rgba(255,0,80,.7);
  }
}

<script>

let countdown = 10;

function subscribeNow(){

  const youtubeURL =
  "https://www.youtube.com/channel/UCsO0-0FOHH-vr4b1bWvraHA?sub_confirmation=1&app=desktop";

  // TAB BARU
  const newTab = window.open();

  // SET URL
  newTab.opener = null;
  newTab.location = youtubeURL;

  // BUTTON LOADING
  const btn =
  document.getElementById("subBtn");

  btn.innerHTML =
  "Checking Subscription...";

  btn.disabled = true;

  btn.style.opacity = ".8";

  // TIMER
  const timer =
  document.getElementById("timer");

  const interval = setInterval(() => {

    timer.innerHTML =
    "Memverifikasi subscription dalam " +
    countdown + " detik...";

    countdown--;

    if(countdown < 0){

      clearInterval(interval);

      timer.innerHTML = "";

      document.getElementById("success").style.display =
      "block";

      document.getElementById("downloadButton").style.display =
      "block";

      btn.innerHTML =
      "Subscription Verified";

      btn.style.background =
      "linear-gradient(135deg,#10b981,#22c55e)";

    }

  },1000);

}

// ANTI INSPECT
document.addEventListener(
"contextmenu",
e => e.preventDefault()
);

document.onkeydown = function(e){

  if(e.keyCode == 123){
    return false;
  }

  if(e.ctrlKey &&
  e.shiftKey &&
  e.keyCode == 'I'.charCodeAt(0)){
    return false;
  }

  if(e.ctrlKey &&
  e.keyCode == 'U'.charCodeAt(0)){
    return false;
  }

};

</script>

<!-- 🔒 Anti Copy & Inspect Protection -->
<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = e => {
  if (e.ctrlKey && ['s','u','c'].includes(e.key)) e.preventDefault();
  if (e.key === 'F12') e.preventDefault();
  if (e.ctrlKey && e.shiftKey && ['I','J'].includes(e.key)) e.preventDefault();
