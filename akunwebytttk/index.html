<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweater Pink Overlay</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 380px;
        height: 110px;
      }

      .card {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #ff4ac9, #a259ff);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 6px;
        padding: 12px;
        box-shadow: 0 8px 25px rgba(255, 0, 150, 0.5);
        border: 3px solid #ffffff;
        outline: 3px solid #ff4ac9;
        outline-offset: 3px;
        overflow: hidden;
        opacity: 0;
        transform: translateY(20px) scale(0.9);
        transition: all 0.4s ease;
      }

      .card.active {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .card::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100px;
        width: 40px;
        height: 100%;
        background: rgba(255, 255, 255, 0.25);
        transform: skewX(-20deg);
        animation: shine 4s infinite;
      }

      @keyframes shine {
        0% {
          left: -100px;
        }
        100% {
          left: 120%;
        }
      }

      .icon {
        width: 45px;
        height: 45px;
        border-radius: 10px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon img {
        width: 24px;
      }

      .text {
        text-align: center;
      }

      .brand {
        font-family: "Montserrat", sans-serif;
        font-size: 26px;
        font-weight: 900;
        color: #ffffff;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
      }

      .mabar {
        font-family: "Montserrat", sans-serif;
        font-size: 28px;
        font-weight: 900;
        color: #ffe600;
        line-height: 1.1;
        margin-top: 4px;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
      }

      .note {
        font-family: "Montserrat", sans-serif;
        font-size: 16px;
        font-weight: 800;
        color: #ffffff;
        margin-top: 5px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card active">
        <div class="icon">
          <img src="https://cdn-icons-png.flaticon.com/512/841/841364.png" />
        </div>
        <div class="text">
          <b class="brand">www.sweaterpink.web.id</b>
        </div>
      </div>

      <div class="card">
        <div class="icon">
          <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" />
        </div>
        <div class="text">
          <b class="brand">Sweater Pink</b>
        </div>
      </div>

      <div class="card">
        <div class="icon">
          <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" />
        </div>
        <div class="text">
          <b class="brand">@sweater_pink</b>
        </div>
      </div>

      <div class="card">
        <div class="text">
          <b class="brand">MABAR</b>
          <div class="mabar">1 GAME 5K | 2 GAME 10K</div>
          <div class="note">Tidak Menjamin Menang Heheh 😆</div>
        </div>
      </div>
    </div>

    <script>
      const cards = document.querySelectorAll(".card");
      let index = 0;

      setInterval(() => {
        cards.forEach((c) => c.classList.remove("active"));
        index = (index + 1) % cards.length;
        cards[index].classList.add("active");
      }, 3000);
    </script>
  </body>
</html>
