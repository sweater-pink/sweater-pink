<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sweater Pink Top Up 💖</title>
<meta content="#FF1499" name="theme-color" />
<style>
:root {
  --pink: #ff1499;
  --purple: #a259ff;
  --blue: #6ecbff;
  --dark: #0e0e12;
  --glass: rgba(255, 255, 255, 0.08);
  --blur: blur(12px);
}

body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;
  color: white;
  background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
  background-size: 300% 300%;
  animation: gradientShift 8s ease infinite;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  text-align: center;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  background: var(--glass);
  backdrop-filter: var(--blur);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(255,20,153,0.25);
  padding: 40px 20px;
  width: 90%;
  max-width: 420px;
  animation: fadeUp 1s ease forwards;
  opacity: 0;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.container h1 {
  font-size: 1.8em;
  margin-bottom: 10px;
  background: linear-gradient(90deg, #fff, #ffd6f5, #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200%;
  animation: shineText 6s linear infinite;
}

@keyframes shineText {
  0% { background-position: 0%; }
  100% { background-position: 200%; }
}

.container p {
  font-size: 0.95em;
  opacity: 0.9;
  margin-bottom: 20px;
  line-height: 1.4;
}

.container img {
  width: 180px;
  border-radius: 18px;
  box-shadow: 0 0 25px rgba(255,255,255,0.25);
  margin-bottom: 15px;
}

.download-btn {
  display: inline-block;
  background: linear-gradient(135deg, #ff1499, #ff6ec7, #a259ff);
  background-size: 200% 200%;
  color: white;
  font-weight: 600;
  text-decoration: none;
  padding: 12px 35px;
  border-radius: 30px;
  margin-top: 10px;
  box-shadow: 0 0 20px rgba(255, 20, 153, 0.35);
  transition: all 0.3s ease;
  animation: gradientShift 4s linear infinite;
}

.download-btn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 28px rgba(255, 20, 153, 0.6);
}

.desc {
  max-width: 550px;
  margin: 35px auto;
  font-size: 0.95em;
  color: #f5f5f5;
  line-height: 1.6;
}

.section-title {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: var(--blur);
  padding: 8px 18px;
  border-radius: 12px;
  color: #fff;
  font-weight: 600;
  margin-top: 30px;
  box-shadow: 0 0 12px rgba(255, 20, 153, 0.3);
}

.img-card {
  margin: 20px auto 40px;
}

.img-card img {
  width: 260px;
  border-radius: 14px;
  box-shadow: 0 0 20px rgba(255,255,255,0.25);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.img-card img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(255, 20, 153, 0.6);
}

footer {
  margin-top: 35px;
  font-size: 0.85em;
  color: rgba(255,255,255,0.8);
}

footer span {
  color: #fff;
  font-weight: 600;
  text-shadow: 0 0 8px rgba(255,20,153,0.5);
}

@media (max-width: 600px) {
  .container img { width: 150px; }
  .img-card img { width: 200px; }
  .container h1 { font-size: 1.5em; }
  .download-btn { padding: 10px 25px; font-size: 0.9em; }
  .section-title { font-size: 0.9em; padding: 6px 14px; }
}
</style>
</head>
<body>

<div class="container">
  <img src="https://sweaterpink.web.id/icon/logoappsweaterpink.png" alt="Sweater Pink Logo">

  <h1>Sweater Pink Top Up</h1>
  <p>Aplikasi murah dan terpercaya<br>untuk paket data reguler & inject</p>

  <a href="https://www.mediafire.com/file/c3rr48bbd1v9hmj/sweaterpink.apk/file" class="download-btn">⬇ DOWNLOAD</a>

  <div class="desc">
    Aplikasi ini menyediakan paket data reguler dan inject yang pastinya
    <strong>lebih murah!</strong>
  </div>

  <div class="section-title">XL</div>

  <div class="img-card">

<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = e => {
  if (e.ctrlKey && ['s','u','c'].includes(e.key)) e.preventDefault();
  if (e.key === 'F12') e.preventDefault();

</html>
