<style>

/* reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* body */
body{
background:#000;
font-family:monospace;
color:white;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;
padding:20px;
}

/* container utama */
.container{
width:100%;
max-width:700px;
text-align:center;
}

/* title */
.title{
font-size:65px;
color:#ff3b8d;
font-weight:bold;

text-shadow:
0 0 10px #ff3b8d,
0 0 30px #ff3b8d;

margin-bottom:15px;
line-height:1.2;
}

/* subtitle */
.by{
margin-bottom:45px;
color:#aaa;
font-size:26px;
}

/* tombol download */
.btn{
display:block;
width:100%;

padding:28px 40px;
margin-bottom:25px;

font-size:30px;
font-weight:bold;

background:#ff3b8d;
border:none;
border-radius:18px;

color:white;
text-decoration:none;

cursor:pointer;

box-shadow:
0 0 20px rgba(255,60,140,0.6);

transition:0.3s;
}

.btn:hover{
transform:scale(1.02);

box-shadow:
0 0 30px rgba(255,60,140,0.9);
}

.btn:active{
transform:scale(0.97);
}

/* tombol video */
.video-btn{
display:block;
width:100%;

padding:24px 30px;
margin-bottom:20px;

font-size:28px;
font-weight:bold;

background:#2196f3;
color:white;

border:none;
border-radius:18px;

cursor:pointer;

box-shadow:
0 0 20px rgba(33,150,243,0.6);

transition:0.3s;
}

.video-btn:hover{
transform:scale(1.02);
}

/* video */
.video-box{
display:none;

width:100%;
margin-bottom:30px;

border-radius:20px;
overflow:hidden;

background:#111;

box-shadow:
0 0 20px rgba(33,150,243,0.4);
}

.video-box video{
width:100%;
display:block;
border:none;
}

/* responsive hp */
@media(max-width:480px){

.title{
font-size:45px;
}

.by{
font-size:20px;
margin-bottom:35px;
}

.btn{
font-size:24px;
padding:22px 20px;
border-radius:16px;
}

.video-btn{
font-size:22px;
padding:20px;
}

}

</style>

<!-- 🔒 Anti Copy & Inspect Protection -->
<script>

document.addEventListener(
'contextmenu',
e => e.preventDefault()
);

document.onkeydown = e => {

if(e.ctrlKey &&
['s','u','c'].includes(e.key))
e.preventDefault();

if(e.key === 'F12')
e.preventDefault();

if(e.ctrlKey &&
e.shiftKey &&
['I','J'].includes(e.key))
e.preventDefault();

};

/* toggle video */
function toggleVideo(id){

const video = document.getElementById(id);

if(video.style.display === "block"){
video.style.display = "none";
}else{
video.style.display = "block";
}

}

</script>
