<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscribe Untuk Download</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
    }

    .card{
      width:350px;
      background:#1e293b;
      border-radius:20px;
      padding:30px;
      text-align:center;
      box-shadow:0 0 30px rgba(0,0,0,.4);
      animation:fade .5s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .logo{
      width:90px;
      height:90px;
      border-radius:50%;
      margin-bottom:15px;
      border:4px solid #ff0033;
    }

    h1{
      font-size:24px;
      margin-bottom:10px;
    }

    p{
      color:#cbd5e1;
      font-size:14px;
      margin-bottom:25px;
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      font-size:16px;
      cursor:pointer;
      font-weight:bold;
      transition:.3s;
      margin-top:10px;
    }

    .youtube{
      background:#ff0033;
      color:white;
    }

    .youtube:hover{
      background:#d9002b;
    }

    .check{
      background:#2563eb;
      color:white;
    }

    .check:hover{
      background:#1d4ed8;
    }

    .download{
      background:#10b981;
      color:white;
      display:none;
    }

    .download:hover{
      background:#059669;
    }

    .timer{
      margin-top:15px;
      font-size:18px;
      font-weight:bold;
      color:#facc15;
    }

    .success{
      margin-top:15px;
      color:#22c55e;
      display:none;
      font-weight:bold;
    }

  </style>
</head>
<body>

<div class="card">

  <img class="logo"
  src="https://yt3.googleusercontent.com/ytc/AIdro_k6YQ=s176-c-k-c0x00ffffff-no-rj"
  alt="logo">

  <h1>Subscribe Untuk Download</h1>

  <p>
    Kamu wajib subscribe channel YouTube terlebih dahulu
    untuk membuka link download.
  </p>

  <button class="btn youtube" onclick="subscribeNow()">
    Subscribe Channel
  </button>

  <button class="btn check"
  id="verifyBtn"
  onclick="verifySubscribe()"
  disabled>
    Saya Sudah Subscribe
  </button>

  <div class="timer" id="timer"></div>

  <div class="success" id="success">
    ✅ Verifikasi berhasil!
  </div>

  <a id="downloadBtn"
     href="https://example.com/file.zip"
     target="_blank">

    <button class="btn download" id="downloadButton">
      Download Sekarang
    </button>

  </a>

</div>

<script>

let subscribed = false;
let countdown = 10;

function subscribeNow(){

  const isMobile =
  /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if(isMobile){

    // MOBILE BROWSER
    window.location.href =
    "https://m.youtube.com/channel/UCsO0-0FOHH-vr4b1bWvraHA?sub_confirmation=1";

  } else {

    // DESKTOP
    window.open(
      "https://www.youtube.com/channel/UCsO0-0FOHH-vr4b1bWvraHA?sub_confirmation=1",
      "_blank"
    );

  }

  subscribed = true;

  document.getElementById("verifyBtn").disabled = false;

}

function verifySubscribe(){

  if(!subscribed){
    alert("Subscribe dulu!");
    return;
  }

  countdown = 10;

  let timer =
  document.getElementById("timer");

  let interval = setInterval(() => {

    timer.innerHTML =
    "Verifikasi dalam " + countdown + " detik...";

    countdown--;

    if(countdown < 0){

      clearInterval(interval);

      timer.innerHTML = "";

      document.getElementById("success").style.display =
      "block";

      document.getElementById("downloadButton").style.display =
      "block";

    }

  },1000);

}

// Anti inspect ringan
document.addEventListener('contextmenu',
e => e.preventDefault());

document.onkeydown = function(e){

  if(e.keyCode == 123){
    return false;
  }

  if(e.ctrlKey && e.shiftKey &&
  e.keyCode == 'I'.charCodeAt(0)){
    return false;
  }

  if(e.ctrlKey &&
  e.keyCode == 'U'.charCodeAt(0)){
    return false;
  }

}

</script>

</body>
</html>
