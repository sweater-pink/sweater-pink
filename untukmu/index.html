<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tangkap Hati</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
text-align:center;
min-height:100vh;
}

/* INTRO */

#intro{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
z-index:10;
overflow:hidden;
}

#introText{
color:white;
font-size:30px;
padding:40px;
text-shadow:0 0 20px rgba(255,255,255,.7);
min-height:60px;
max-width:500px;
}

/* stars */

.star{
position:absolute;
background:white;
border-radius:50%;
opacity:.8;
animation:starMove linear infinite;
}

@keyframes starMove{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* GAME */

#title{
display:none;
margin-top:10px;
font-size:26px;
}

#game{
display:none;
position:relative;
width:90vw;
max-width:380px;

/* FIX garis bawah */
height:min(65vh,520px);

margin:10px auto;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 30px rgba(0,0,0,.3);
}

#player{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
font-size:44px;
}

.heart{
position:absolute;
font-size:28px;
color:#ff0033;
}

.particle{
position:absolute;
font-size:14px;
pointer-events:none;
animation:explode 600ms ease-out forwards;
}

@keyframes explode{
0%{opacity:1; transform:scale(1)}
100%{opacity:0; transform:translate(var(--x),var(--y)) scale(.3)}
}

#score{
display:none;
font-size:18px;
margin:5px;
}

/* joystick */

#joystick{
display:none;
position:relative;
width:140px;
height:140px;
margin:10px auto;
background:rgba(255,255,255,.8);
border-radius:50%;
border:2px solid #ff4d6d;
touch-action:none;
}

#stick{
position:absolute;
width:60px;
height:60px;
left:40px;
top:40px;
background:#ff4d6d;
border-radius:50%;
}

</style>
</head>

<body>

<div id="intro">
<div id="introText"></div>
</div>

<h2 id="title">Tangkap Hati</h2>

<div id="game">
<div id="player">🙂</div>
</div>

<div id="score">Hati: 0 / 10</div>

<div id="joystick">
<div id="stick"></div>
</div>

<script>

/* INTRO TEXT */

const introText=[
"Ada sebuah pesan kecil...",
"yang dibuat dengan tulus.",
"Mungkin sederhana...",
"tapi dibuat khusus untukmu.",
"Siap bermain?"
];

let introIndex=0;

function typeText(text,callback){

let i=0;
let el=document.getElementById("introText");
el.innerHTML="";

let typing=setInterval(()=>{

el.innerHTML+=text.charAt(i);
i++;

if(i>=text.length){
clearInterval(typing);
setTimeout(callback,1200);
}

},40);

}

function showIntro(){

if(introIndex<introText.length){

typeText(introText[introIndex],()=>{
introIndex++;
showIntro();
});

}else{

startGame();

}

}

showIntro();

/* STARS */

for(let i=0;i<120;i++){

let s=document.createElement("div");

s.className="star";

let size=Math.random()*3+1;

s.style.width=size+"px";
s.style.height=size+"px";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(6+Math.random()*8)+"s";

document.body.appendChild(s);

}

/* START GAME */

function startGame(){

let intro=document.getElementById("intro");

intro.style.opacity="0";
intro.style.transition="1s";

setTimeout(()=>{

intro.remove();

document.getElementById("game").style.display="block";
document.getElementById("title").style.display="block";
document.getElementById("score").style.display="block";
document.getElementById("joystick").style.display="block";

startGameLoop();

},1000);

}

/* GAME */

let player=document.getElementById("player");
let game=document.getElementById("game");
let stick=document.getElementById("stick");

let score=0;
let moveDir=0;

function explode(x,y){

for(let i=0;i<12;i++){

let p=document.createElement("div");
p.className="particle";
p.innerHTML="❤";

p.style.left=x+"px";
p.style.top=y+"px";

let angle=Math.random()*360;
let dist=40+Math.random()*40;

let dx=Math.cos(angle)*dist+"px";
let dy=Math.sin(angle)*dist+"px";

p.style.setProperty("--x",dx);
p.style.setProperty("--y",dy);

game.appendChild(p);

setTimeout(()=>p.remove(),600);

}

}

function spawnHeart(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*(game.clientWidth-40)+"px";
heart.style.top="-40px";

game.appendChild(heart);

let fall=setInterval(()=>{

heart.style.top=heart.offsetTop+3+"px";

let playerRect=player.getBoundingClientRect();
let heartRect=heart.getBoundingClientRect();

if(
playerRect.left < heartRect.right &&
playerRect.right > heartRect.left &&
playerRect.top < heartRect.bottom &&
playerRect.bottom > heartRect.top
){

score++;

document.getElementById("score").innerText="Hati: "+score+" / 10";

explode(heart.offsetLeft,heart.offsetTop);

heart.remove();
clearInterval(fall);

if(score>=10){
win();
}

}

if(heart.offsetTop>game.clientHeight){
heart.remove();
clearInterval(fall);
}

},30);

}

function spawnLoop(){

spawnHeart();
setTimeout(spawnLoop,1000+Math.random()*800);

}

function playerMoveLoop(){

setInterval(()=>{

let pos=player.offsetLeft+(moveDir*5);

pos=Math.max(0,Math.min(game.clientWidth-40,pos));

player.style.left=pos+"px";

},16);

}

function startGameLoop(){

spawnLoop();
playerMoveLoop();

}

/* joystick */

let dragging=false;

stick.addEventListener("touchstart",()=>dragging=true);

document.addEventListener("touchend",()=>{
dragging=false;
moveDir=0;
stick.style.left="40px";
});

document.addEventListener("touchmove",(e)=>{

if(!dragging) return;

let rect=document.getElementById("joystick").getBoundingClientRect();

let x=e.touches[0].clientX-rect.left-70;

stick.style.left=(x+40)+"px";

moveDir=x/40;

},{passive:false});

/* keyboard */

document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowLeft")moveDir=-1;
if(e.key==="ArrowRight")moveDir=1;
});

document.addEventListener("keyup",()=>moveDir=0);

/* win */

function win(){

document.body.innerHTML = `

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:radial-gradient(circle,#ff7eb3,#ff758c,#3a0f2d);
overflow:hidden;
font-family:Arial;
color:white;
text-align:center;
padding:30px;
}

.message{
font-size:24px;
max-width:600px;
line-height:1.8;
transition:1.5s;
}

.signature{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.5);
display:flex;
align-items:center;
gap:25px;
opacity:0;
transition:2s;
}

.line{
width:110px;
height:2px;
background:white;
box-shadow:0 0 10px #ff4d6d;
}

.name{
font-size:60px;
font-family:"Brush Script MT",cursive;
text-shadow:
0 0 10px #ff4d6d,
0 0 30px #ff4d6d,
0 0 60px #ff4d6d;
}

.heartFall{
position:fixed;
top:-20px;
font-size:24px;
color:#ff0033;
animation:fall linear infinite;
text-shadow:
0 0 5px #ff0033,
0 0 10px #ff0033,
0 0 20px #ff3366,
0 0 30px #ff4d6d;
}

@keyframes fall{
0%{transform:translateY(0);opacity:0}
10%{opacity:1}
100%{transform:translateY(110vh);opacity:0}
}

.particle{
position:fixed;
font-size:22px;
pointer-events:none;
animation:explode 2s ease-out forwards;
}

@keyframes explode{
0%{
opacity:1;
transform:translate(-50%,-50%) scale(.6);
}
100%{
opacity:0;
transform:translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.3);
}
}

</style>

<div class="message" id="text"></div>

<div class="signature" id="sig">
<div class="line"></div>
<div class="name">Lukman</div>
<div class="line"></div>
</div>

`;


/* pesan */

const message = `Ternyata kamu pandai menangkap hati...

Tapi ada satu hal yang mungkin kamu belum tahu.

Sejak lama ada seseorang
yang diam-diam juga berharap
bisa menangkap hatimu.

Bukan dengan permainan,
bukan dengan kata-kata besar,
hanya dengan perhatian kecil
yang tulus untukmu.

Kalau suatu hari kamu menoleh ke belakang,
mungkin kamu akan menemukan dia
yang sejak awal sudah menunggu di sana.`;


/* typewriter */

let i=0;
const text=document.getElementById("text");

function type(){

if(i < message.length){
text.innerHTML += message.charAt(i);
i++;
setTimeout(type,80);
}else{
removeText();
}

}

type();


function removeText(){

text.style.opacity="0";

setTimeout(showName,1500);

}


function showName(){

const s=document.getElementById("sig");

s.style.opacity="1";
s.style.transform="translate(-50%,-50%) scale(1)";

setTimeout(explodeHeart,1000);

}


/* ledakan hati */

function explodeHeart(){

const colors=[
"#ff4d6d",
"#ff758f",
"#ff8fa3",
"#ffd6e0",
"#ff6b81",
"#ff99c8"
];

for(let i=0;i<120;i++){

let p=document.createElement("div");

p.className="particle";
p.innerHTML="❤";

p.style.left="50%";
p.style.top="50%";

p.style.color=colors[Math.floor(Math.random()*colors.length)];

let angle=Math.random()*360;
let dist=180+Math.random()*220;

let dx=Math.cos(angle)*dist+"px";
let dy=Math.sin(angle)*dist+"px";

p.style.setProperty("--x",dx);
p.style.setProperty("--y",dy);

document.body.appendChild(p);

setTimeout(()=>p.remove(),2000);

}

}


/* hati jatuh */

setInterval(()=>{

let h=document.createElement("div");

h.className="heartFall";
h.innerHTML="❤";

h.style.left=Math.random()*100+"%";
h.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),8000);

},250);

}
</script>

</body>
</html>
