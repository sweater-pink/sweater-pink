<style>

    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:#fff0f5;
    margin:0;
    padding:20px
  }

#password-box{
  background:linear-gradient(135deg,#ffffff,#ffb3d9,#ff3fbf);
  background-size:150% 150%;
  animation:bgMove 8s ease infinite;

  padding:20px;
  border-radius:12px;
  text-align:center;
  width:90%;
  max-width:420px;
  margin:20px auto;

  box-shadow:0 6px 20px rgba(255,77,148,0.25);
  position:relative;
  overflow:hidden;
}
#password-box::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 12px;
  padding: 2px;

  background: linear-gradient(135deg, #ff2fb3, #ff4ac9, #ff80df);

  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none;
}
  /* 🔥 QUOTE BOX PREMIUM */
  #quote-box{
    display:none;

    background:linear-gradient(135deg,#ffffff,#ffb3d9,#ff3fbf);
    background-size:150% 150%;
    animation:bgMove 8s ease infinite;

    color:#333;
    font-size:18px;
    margin:20px auto;
    text-align:center;
    padding:20px;
    border-radius:12px;
    width:90%;
    max-width:560px;

    box-shadow:0 6px 20px rgba(255,77,148,0.25);
    position:relative;
    overflow:hidden;

    opacity:0;
    transition:opacity .8s ease-in;
  }

  /* 🔥 GARIS PINK PREMIUM */
  #quote-box::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 12px;
    padding: 2px;

    background: linear-gradient(135deg, #ff2fb3, #ff4ac9, #ff80df);

    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;

    pointer-events: none;
  }

  /* ✨ ANIMASI BACKGROUND */
  @keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .btn{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600
  }

  .btn-green{background:var(--green)}

  .input-wrap{
    position:relative;
    width:82%;
    margin:0 auto 12px
  }

  input[type=password],input[type=text]{
    padding:10px 38px 10px 12px;
    background:#fff;
    border:none;
    border-radius:8px;
    width:100%;
    box-sizing:border-box;
    color:#000;
    outline:none
  }

  .eye{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:16px;
    color:#555;
    background:transparent;
    border:none
  }

  #error-msg{
    color:#b00020;
    font-weight:bold;
    display:none;
    margin-top:12px
  }

  /* 💖 LIST */
  .pink-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .pink-list li {
    background: #ffe4ef;
    border-left: 4px solid #ff4d94;
    padding: 8px 10px;
    margin-bottom: 6px;
    border-radius: 6px;
    font-size: 14px;
  }

  .pink-list li::before {
    content: "💖 ";
  }
</style>
</head>
<body>

<div id="password-box">

  </p>

  <div class="input-wrap">
    <input type="password" id="password-input" placeholder="Password..."

  <button class="btn" onclick="checkPassword()">Submit</button>
  <p id="error-msg"></p>
</div>

<div id="quote-box"></div>

<script>
// 🔓 toggle
function togglePassword(){
  const input = document.getElementById("password-input");
  input.type = input.type === "password" ? "text" : "password";
}

// 🔥 LOGIN (API GOOGLE)
async function checkPassword(){
  const inputVal = document.getElementById("password-input").value.trim();
  const errorMsg = document.getElementById("error-msg");

  if(!inputVal){
    errorMsg.textContent = "Password tidak boleh kosong.";
    errorMsg.style.display = "block";
    return;
  }

  try{
    const res = await fetch("https://script.google.com/macros/s/AKfycbzsEb5LAtc07bWtKRzoMi3YgElrmOC2WwSFbgXC3BEjHJ_rM8i5B13Q4AJiHjUMPUqSdw/exec?password=" + encodeURIComponent(inputVal));

    document.getElementById("password-box").style.display = "none";

    renderQuote({
      quotes: [data.username],
      perhatianLink: "https://youtube.com/shorts/KgC2eDR5Py0",
      downloadLink: "https://sub2unlock.me/xO7wXUh",
      groupLink: "https://chat.whatsapp.com/I0K1P1SGVu05GQbh7j3pOC?mode=ems_copy_t"

      'Password salah!!! cek video terbaru di sini ' +
      '<a href="' + url + '" target="_blank" style="text-decoration:underline;color:#0b5ed7;">link</a>.';
    errorMsg.style.display = "block";
  }
}

// 🎨 RENDER (ASLI DIPERTAHANKAN)
function renderQuote({quotes, perhatianLink, downloadLink, groupLink}) {
  const now = new Date();
  const day = now.getDate();
  const monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  const dateStr = day + " " + monthNames[now.getMonth()] + " " + now.getFullYear();
  const rawQuote = (quotes && quotes.length) ? quotes[0] : "";
  const cleanQuote = String(rawQuote||"").replace(/^\d{1,2}:\s*/, "");

  const box = document.getElementById("quote-box");
  box.innerHTML =
    "<b style='font-size:22px'>" + dateStr + "</b>" +
    "<div style='background:#fff3cd;color:#856404;border:1px solid #ffeeba;padding:12px;border-radius:10px;margin:16px auto 12px;text-align:left;max-width:490px;'>" +
      "<b style='display:block;margin-bottom:6px;'>⚠️Perhatian!!!</b>" +
      "<ul class='pink-list'>" +
  "<li>Username & password berubah setiap hari pukul 00:00</li>" +
  "<li>Gunakan akun sesuai tanggal pemakaian</li>" +
  "<li>Jika sudah kedaluwarsa, ambil yang terbaru di website</li>" +
  "<li>Lihat panduan video jika masih bingung</li>" +
"</ul>" +
      "<a href='" + (perhatianLink||"#") + "' target='_blank' style='color:#d63384;font-weight:bold;text-decoration:underline;'>🔗 Panduan username:password</a>" +
    "</div>" +
    "<span id='today-quote' style='display:block;margin-top:8px;font-style:italic;'>" + cleanQuote + "</span>" +
    "<div style='margin-top:18px;display:flex;flex-direction:column;align-items:center;gap:12px;'>" +
      "<button class='btn' onclick='copyQuote()'>Salin</button>" +
      "<p id='copy-msg' style='color:green;font-weight:bold;display:none;margin:0;'>✔ username:password berhasil disalin!</p>" +
      "<a href='" + (downloadLink||"#") + "' target='_blank' class='btn'>⬇ Download Config V.16</a>" +
      "<a href='" + (groupLink||"#") + "' target='_blank' class='btn btn-green'>👥 Join Grup Komunitas</a>" +
    "</div>";

  box.style.display = "block";
  requestAnimationFrame(()=>{ box.style.opacity = 1; });
}

// 📋 COPY
function copyQuote(){
  const text = document.getElementById("today-quote").innerText;
  navigator.clipboard.writeText(text).then(()=>{
    document.getElementById("copy-msg").style.display = "block";
  });
}
</script>

<script>
