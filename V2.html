<!-- TITLE -->
<h2 class="dns-title">Aplikasi Asisten Digital</h2>

<!-- OPEN SETTINGS BUTTON -->
<div class="btn-wrapper">
  <button class="btn" onclick="openAssistantSettings()">
    OPEN SETTING
  </button>
</div>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* title */
.dns-title{
  text-align:center;
  font-size:42px;
  font-weight:700;
  margin-bottom:25px;
  color:#ff3b8d;
  text-shadow:0 0 10px #ff3b8d,0 0 30px #ff3b8d;
  font-family:'Poppins',sans-serif;
  letter-spacing:1px;
  padding:0 10px;
  line-height:1.2;
}

/* center button */
.btn-wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  padding:0 15px;
}

/* button */
.btn{
  width:100%;
  max-width:420px; /* tombol lebih besar */
  margin-bottom:20px;
  padding:22px 25px; /* tinggi tombol besar */
  font-size:26px; /* tulisan besar */
  font-weight:700;
  background:#ff3b8d;
  border:none;
  border-radius:18px;
  color:white;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,60,140,0.6);
  transition:0.3s ease;
  font-family:'Poppins',sans-serif;
  letter-spacing:1px;
}

.btn:hover{
  transform:scale(1.03);
  box-shadow:0 0 30px rgba(255,60,140,0.9);
}

.btn:active{
  transform:scale(0.97);
}

/* responsive hp */
@media(max-width:480px){

.dns-title{
  font-size:32px;
  margin-bottom:20px;
}

.btn{
  max-width:100%;
  font-size:22px; /* tulisan tetap besar di hp */
  padding:20px;
  border-radius:16px;
}

}

</style>

<script>
function openAssistantSettings(){

  // buka voice input settings
  window.location.href =
  "intent:#Intent;action=android.settings.VOICE_INPUT_SETTINGS;end";

  // fallback ke settings utama
  setTimeout(() => {
    window.location.href =
    "intent://com.android.settings/#Intent;scheme=android-app;end";
  },1500);

}
</script>
