<!-- TITLE -->
<h2 class="title">Aplikasi Asisten Digital</h2>

<div class="by">BY : SWEATER PINK</div>

<!-- BUTTON -->
<button class="btn" onclick="openAssistantSettings()">
  OPEN SETTINGS
</button>

<style>

body{
margin:0;
background:#000;
font-family:monospace;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* container */
.container{
width:90%;
max-width:500px;
text-align:center;
}

/* title */
.title{
font-size:42px;
color:#ff3b8d;
font-weight:bold;
text-shadow:0 0 10px #ff3b8d,0 0 30px #ff3b8d;
margin-bottom:10px;
}

/* subtitle */
.by{
color:#aaa;
font-size:18px;
margin-bottom:30px;
}

/* button */
.btn{
width:100%;
padding:15px 40px;
font-size:18px;
background:#ff3b8d;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
box-shadow:0 0 15px rgba(255,60,140,0.5);
transition:0.3s;
}

/* hover */
.btn:hover{
transform:scale(1.02);
box-shadow:0 0 25px rgba(255,60,140,0.8);
}

/* click */
.btn:active{
transform:scale(0.97);
}

/* responsive */
@media(max-width:480px){

.title{
font-size:34px;
}

.btn{
font-size:17px;
padding:14px 20px;
}

}

</style>

<script>

function openAssistantSettings(){

  // buka voice input settings
  window.location.href =
  "intent:#Intent;action=android.settings.VOICE_INPUT_SETTINGS;end";

  // fallback settings utama
  setTimeout(() => {

    window.location.href =
    "intent://com.android.settings/#Intent;scheme=android-app;end";

  },1500);

}

</script>
