<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ngabisin Kouta</title>

  <meta name="title" content="Ngabisin Kouta - waste your data">
  <meta name="description" content="The fastest and the most efficient way to waste your valuable mobile data">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

body{
  background:linear-gradient(180deg,#fff7fb,#ffeaf4);
  color:#222;
  font-family:'Poppins',sans-serif;
}

.bg-body-tertiary{
  background:#ffffff!important;
  border-radius:30px!important;
  box-shadow:0 10px 40px rgba(255,60,140,0.12)!important;
  border:1px solid rgba(255,80,150,0.08);
}

#title{
  color:#ff2f86;
  text-align:center;
  font-weight:800;
  font-size:4rem;
  text-shadow:0 0 20px rgba(255,50,140,0.2);
}

#desc{
  text-align:center;
  color:#555;
}

.btn-primary{
  background:linear-gradient(90deg,#ff4f9d,#ff1f82)!important;
  border:none!important;
  border-radius:18px!important;
  font-weight:700;
  box-shadow:0 8px 20px rgba(255,50,140,0.3);
}

.btn-primary:hover{
  transform:translateY(-1px);
}

.btn-outline-primary{
  border:2px solid #ff3b8d!important;
  color:#ff3b8d!important;
  border-radius:16px!important;
  font-weight:700;
}

.btn-outline-primary.active{
  background:#ff3b8d!important;
  color:#fff!important;
}

.btn-outline-success{
  border:2px solid #ff3b8d!important;
  color:#ff3b8d!important;
  border-radius:16px!important;
  font-weight:700;
}

.btn-outline-success:hover{
  background:#ff3b8d!important;
  color:#fff!important;
}

.form-control{
  border-radius:16px!important;
  padding:16px!important;
  border:2px solid #f1d6e2!important;
  text-align:right;
}

.progress{
  background:#ffd5e7!important;
  border-radius:999px!important;
}

.progress-bar{
  background:linear-gradient(90deg,#ff4f9d,#ff1f82)!important;
}

.form-range::-webkit-slider-thumb{
  background:#ff2f86!important;
  cursor:pointer;
}

.form-range::-moz-range-thumb{
  background:#ff2f86!important;
}

.value-number{
  color:#ff2f86;
  font-weight:800!important;
}

.border-top{
  border-color:#ffd6e7!important;
}

.text-body-secondary{
  color:#777!important;
}

#downloadProgress,
#uploadProgress{
  height:8px;
  border-radius:999px;
}

svg rect{
  fill:#ff3b8d!important;
}

.btn-lg{
  padding:18px!important;
  font-size:24px!important;
}

.form-range{
  width:100%;
  height:10px;
}

.form-range::-webkit-slider-runnable-track{
  background:#ffd5e7;
  border-radius:999px;
}

@media(max-width:768px){

#title{
  font-size:3rem!important;
}

#desc{
  font-size:18px!important;
}

.btn-lg{
  font-size:20px!important;
}

}

@media (prefers-color-scheme: dark) {

body{
  background:#121212;
  color:#f1f1f1;
}

.bg-body-tertiary{
  background:#1f1f1f!important;
  border:1px solid #2c2c2c;
}

#desc{
  color:#bbb;
}

.form-control{
  background:#2b2b2b!important;
  color:#fff!important;
  border-color:#444!important;
}

.form-control:focus{
  background:#2b2b2b!important;
  color:#fff!important;
}

.border-top{
  border-color:#333!important;
}

.text-muted{
  color:#aaa!important;
}

}

  </style>

  <script src="./digitalWaste.js" defer></script>
  <script src="./app.js" defer></script>

</head>

<body>

  <div class="container py-2 py-md-4">

    <div class="p-3 p-md-5 mb-4 bg-body-tertiary rounded-3">

      <div class="container-fluid py-2 py-md-3">

        <h1 class="display-5 fw-bold" id="title">
          Ngabisin Kouta
        </h1>

        <p class="col-md-12 fs-4" id="desc">
          The fastest and most efficient way to waste your valuable mobile data.
        </p>

        <hr>

        <div class="row mb-3">

          <div class="col-md-6 mb-3 d-flex align-items-center">

            <div class="d-flex gap-2">

              <button type="button"
              class="btn btn-outline-primary active"
              id="downloadOption"
              data-active="true">

                Download

              </button>

              <button type="button"
              class="btn btn-outline-success"
              id="uploadOption"
              data-active="false">

                Upload

              </button>

            </div>

            <small class="text-muted ms-3">
              Select at least one direction
            </small>

          </div>

        </div>

        <div class="row mb-3">

          <div class="col-md-6 mb-2 mb-md-0">

            <label for="dataSize" class="form-label">
              Data size (MB, 0 for infinite):
            </label>

            <input type="number"
            class="form-control"
            id="dataSize"
            value="10000"
            min="0"
            max="10000000">

          </div>

          <div class="col-md-6 mt-1 mt-md-0">

            <div class="d-flex align-items-center">

              <label for="threadCount"
              class="form-label me-2">

                Concurrent connections:

              </label>

              <span id="threadValue"
              class="fw-bold"
              style="position: relative; top: -4px;">
              </span>

            </div>

            <input type="range"
            class="form-range"
            id="threadCount"
            min="1"
            max="64"
            value="16"
            style="margin-top: 6px;">

          </div>

        </div>

        <div class="row">

          <div class="col-12 mb-3">

            <button class="btn btn-primary btn-lg w-100"
            type="button"
            id="startButton">

              Start

            </button>

          </div>

        </div>

        <div class="row mb-2">

          <div class="col-12">

            <div class="progress-stacked" style="height: 8px;">

              <div class="progress h-100"
              style="width: 0%">

                <div class="progress-bar h-100"
                id="downloadProgress">
                </div>

              </div>

              <div class="progress h-100"
              style="width: 0%">

                <div class="progress-bar h-100"
                id="uploadProgress">
                </div>

              </div>

            </div>

          </div>

        </div>

        <div class="row mb-4">

          <div class="col-12 mb-2">

            <div class="d-flex justify-content-between align-items-center">

              <div>

                <span class="value-number"
                id="totalBytesProcessed">

                  0

                </span>

                MB total

              </div>

              <div class="text-end">

                <span class="value-number"
                id="totalTransferSpeed">

                  0

                </span>

                MB/sec

              </div>

            </div>

          </div>

          <div class="col-md-6">

            <div class="d-flex align-items-center">

              <div class="me-2">

                <svg width="12" height="12">
                  <rect width="12"
                  height="12"
                  style="fill:#ff3b8d"/>
                </svg>

              </div>

              <div>

                <span class="value-number"
                id="bytesDownloaded">

                  0

                </span>

                MB downloaded

              </div>

            </div>

          </div>

          <div class="col-md-6 text-md-end">

            <div class="d-flex align-items-center justify-content-md-end">

              <div class="me-2">

                <svg width="12" height="12">
                  <rect width="12"
                  height="12"
                  style="fill:#ff3b8d"/>
                </svg>

              </div>

              <div>

                <span class="value-number"
                id="bytesUploaded">

                  0

                </span>

                MB uploaded

              </div>

            </div>

          </div>

        </div>

        <footer class="pt-3 mt-4 text-body-secondary border-top">

          Created & maintained by SWEATER PINK

        </footer>

      </div>

    </div>

  </div>

</body>
</html>
