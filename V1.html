<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BYPASS ANDROID</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:monospace;
height:100dvh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* container tengah */
.container{
width:90%;
max-width:400px;
}

/* judul */
.title{
font-size:9vw;

0 0 10px #ff3b8d,

}

.by{

.button{

}

transform:scale(0.95);
}

</style>
</head>

<body>

<div class="container">

</div>

<script>

location.href="intent://com.android.settings/#Intent;scheme=android-app;end";
}
</script>
