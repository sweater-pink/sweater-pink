```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BYPASS ANDROID</title>

<style>

body{
    margin:0;
    background:#000;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

/* container */
.box{
    width:90%;
}

/* title */
.title{
    font-size:8vw;
    color:#ff3b8d;
    text-shadow:
    0 0 10px #ff3b8d,
    0 0 20px #ff3b8d,
    0 0 40px #ff3b8d;
    font-weight:bold;
}

/* subtitle */
.by{
    margin-top:10px;
    color:#bbb;
    font-size:4vw;
}

/* button */
.btn{
    margin-top:40px;
    padding:15px 35px;
    font-size:18px;
    background:#ff3b8d;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

.btn:hover{
    background:#ff1f76;
}

</style>
</head>

<body>

<div class="box">

<div class="title">
BYPASS ANDROID
</div>

<div class="by">
BY : SWEATER PINK
</div>

<button class="btn" onclick="openSettings()">
OPEN SETTINGS
</button>

</div>

<script>
function openSettings(){
window.location.href="intent://com.android.settings/#Intent;scheme=android-app;end";
}
</script>

</body>
</html>
